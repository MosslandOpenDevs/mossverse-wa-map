name: Build and deploy

on:
  push:
    branches:
      - master
      - prod
  workflow_dispatch: # allow manual execution

permissions:
  contents: write
  pages: write
  actions: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm install

      - name: Build project
        run: npm run buildmap
        continue-on-error: true
        
      - name: Debug - Check dist contents
        run: |
          echo "=== TMJ files in dist ==="
          find dist -name "*.tmj" -exec sh -c 'echo "$1: $(stat --printf="%s" "$1") bytes"; head -c 100 "$1"' _ {} \;
          echo ""
          echo "=== All files in dist ==="
          find dist -type f | head -30

      - name: Debug - Check what closeBundle reads
        run: |
          echo "=== Line 183 of the plugin ==="
          sed -n '175,195p' node_modules/wa-map-optimizer-vite/dist/index.js

      - name: Extract UPLOAD_MODE from .env
        run: |
          UPLOAD_MODE=$(grep '^[^#]*UPLOAD_MODE' .env | cut -d '=' -f2)
          if [ -z "$UPLOAD_MODE" ]; then
            echo "Error: UPLOAD_MODE is not set in .env."
            exit 1
          fi
          echo "UPLOAD_MODE=$UPLOAD_MODE" >> $GITHUB_ENV

      - name: Set up Environment Variables
        if: ${{ env.UPLOAD_MODE == 'MAP_STORAGE' }}
        run: |
          if [ "${{ github.ref_name }}" = "prod" ]; then
            echo "MAP_STORAGE_API_KEY=${{ secrets.PROD_MAP_STORAGE_API_KEY }}" >> $GITHUB_ENV
            echo "MAP_STORAGE_URL=${{ secrets.PROD_MAP_STORAGE_URL }}" >> $GITHUB_ENV
            echo "UPLOAD_DIRECTORY=${{ secrets.UPLOAD_DIRECTORY }}" >> $GITHUB_ENV
          else
            echo "MAP_STORAGE_API_KEY=${{ secrets.MAP_STORAGE_API_KEY }}" >> $GITHUB_ENV
            echo "MAP_STORAGE_URL=${{ secrets.MAP_STORAGE_URL }}" >> $GITHUB_ENV
            echo "UPLOAD_DIRECTORY=${{ secrets.UPLOAD_DIRECTORY }}" >> $GITHUB_ENV
          fi

      - name: Deploy using WA Map Storage
        if: ${{ env.UPLOAD_MODE == 'MAP_STORAGE' }}
        run: npm run upload-only

      - name: Deploy using Github Pages
        if: ${{ env.UPLOAD_MODE == 'GH_PAGES' }}
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: dist/
          BASE_BRANCH: master

